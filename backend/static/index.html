<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Memory Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-content">
                <h1><i class="fas fa-brain"></i> Company Memory</h1>
                <div class="header-controls">
                    <div class="search-container">
                        <input type="text" id="search-input" placeholder="Search tasks and decisions...">
                        <button id="search-btn" class="btn btn-secondary">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                    <button id="refresh-btn" class="btn btn-secondary">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <div class="theme-toggle">
                        <i class="fas fa-moon"></i>
                    </div>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="card-icon tasks-icon">
                        <i class="fas fa-tasks"></i>
                    </div>
                    <div class="card-content">
                        <h3 id="total-tasks">0</h3>
                        <p>Total Tasks</p>
                    </div>
                </div>
                
                <div class="summary-card">
                    <div class="card-icon decisions-icon">
                        <i class="fas fa-gavel"></i>
                    </div>
                    <div class="card-content">
                        <h3 id="total-decisions">0</h3>
                        <p>Total Decisions</p>
                    </div>
                </div>
                
                <div class="summary-card">
                    <div class="card-icon activity-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <div class="card-content">
                        <h3 id="recent-activity">0</h3>
                        <p>Recent Activity</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Search Results Section -->
        <section class="search-results-section" id="search-results-section" style="display: none;">
            <div class="section-header">
                <h2><i class="fas fa-search"></i> Search Results</h2>
                <button id="clear-search-btn" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Clear Search
                </button>
            </div>
            <div class="section-content">
                <div id="search-results-container">
                    <div class="items-container">
                        <div class="results-column">
                            <h3>Tasks</h3>
                            <div id="search-tasks-container">
                                <div class="loading-state">
                                    <i class="fas fa-spinner fa-spin"></i>
                                    <p>Loading tasks...</p>
                                </div>
                            </div>
                        </div>
                        <div class="results-column">
                            <h3>Decisions</h3>
                            <div id="search-decisions-container">
                                <div class="loading-state">
                                    <i class="fas fa-spinner fa-spin"></i>
                                    <p>Loading decisions...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="dashboard-main">
            <!-- Open Tasks Section -->
            <section class="tasks-section">
                <div class="section-header">
                    <h2><i class="fas fa-tasks"></i> Open Tasks</h2>
                </div>
                <div class="section-content">
                    <div id="tasks-container" class="items-container">
                        <!-- Tasks will be loaded here -->
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading tasks...</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Decisions Section -->
            <section class="decisions-section">
                <div class="section-header">
                    <h2><i class="fas fa-gavel"></i> Key Decisions</h2>
                </div>
                <div class="section-content">
                    <div id="decisions-container" class="items-container">
                        <!-- Decisions will be loaded here -->
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading decisions...</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="dashboard-footer">
            <p>Company Memory Dashboard • Last updated: <span id="last-updated">Never</span></p>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
